<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookForge Studio Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;700;800&family=El+Messiri:wght@400;600;700&family=Lateef:wght@400;500;700&family=Markazi+Text:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar glass">
      <div class="brand">
        <div class="brand-badge">BF</div>
        <div>
          <h1>BookForge Studio Pro</h1>
          <p>صمّم كتابك، عاينه، ثم نزّله بنفس شكل المعاينة</p>
        </div>
      </div>

      <section class="panel">
        <h2>بيانات الكتاب</h2>
        <label>عنوان الكتاب
          <input id="bookTitle" type="text" placeholder="مثال: The Thirteenth Silence">
        </label>
        <label>اسم المؤلف
          <input id="bookAuthor" type="text" placeholder="اسم المؤلف">
        </label>
        <label>وصف الكتاب
          <textarea id="bookDescription" rows="4" placeholder="اكتب وصفًا مختصرًا للكتاب"></textarea>
        </label>
        <label>إهداء
          <textarea id="bookDedication" rows="2" placeholder="إلى..."></textarea>
        </label>
        <label>حقوق النشر
          <textarea id="bookRights" rows="2" placeholder="جميع الحقوق محفوظة..."></textarea>
        </label>
        <label>صورة الغلاف
          <input id="coverInput" type="file" accept="image/*">
        </label>
      </section>

      <section class="panel">
        <h2>إضافة الأجزاء</h2>
        <div class="row">
          <input id="partTitle" type="text" placeholder="عنوان البارت">
          <button id="addPartBtn" class="primary">إضافة</button>
        </div>
        <label>نص البارت
          <textarea id="partContent" rows="7" placeholder="الصق النص هنا"></textarea>
        </label>
        <label>أو ارفع ملفات TXT / MD / DOCX
          <input id="partsFiles" type="file" accept=".txt,.md,.docx" multiple>
        </label>
        <div class="row">
          <button id="importPartsBtn">استيراد الملفات</button>
          <button id="clearPartsBtn" class="danger">حذف كل الأجزاء</button>
        </div>
        <div id="partsList" class="parts-list"></div>
      </section>

      <section class="panel">
        <h2>التصميم</h2>
        <div class="grid-two">
          <label>الثيم
            <select id="themeSelect">
              <option value="luxury-dark">فاخر داكن</option>
              <option value="classic-paper">ورقي كلاسيكي</option>
              <option value="horror-ink">رعب أنيق</option>
              <option value="minimal-light">خفيف حديث</option>
            </select>
          </label>
          <label>حجم الصفحة
            <select id="pageSize">
              <option value="a5">A5</option>
              <option value="b5">B5</option>
              <option value="6x9">6×9 Novel</option>
            </select>
          </label>
          <label>الخط
            <select id="fontSelect">
              <option value="'Amiri', serif">Amiri</option>
              <option value="'Noto Naskh Arabic', serif">Noto Naskh Arabic</option>
              <option value="'Aref Ruqaa', serif">Aref Ruqaa</option>
              <option value="'Markazi Text', serif">Markazi Text</option>
              <option value="'Lateef', serif">Lateef</option>
              <option value="'El Messiri', sans-serif">El Messiri</option>
              <option value="'Cairo', sans-serif">Cairo</option>
            </select>
          </label>
          <label>حجم الخط
            <input id="fontSize" type="range" min="16" max="30" value="20">
          </label>
          <label>تباعد الأسطر
            <input id="lineHeight" type="range" min="1.4" max="2.4" step="0.1" value="1.95">
          </label>
          <label>الهوامش
            <input id="pagePadding" type="range" min="26" max="72" value="44">
          </label>
        </div>

        <div class="color-grid">
          <label>لون الصفحة <input id="pageBg" type="color" value="#f7f1e3"></label>
          <label>لون النص <input id="textColor" type="color" value="#1b1511"></label>
          <label>اللون البارز <input id="accentColor" type="color" value="#b78b47"></label>
          <label>لون الخلفية <input id="appBg" type="color" value="#0e1118"></label>
        </div>

        <div class="checks">
          <label><input id="showFrontMatter" type="checkbox" checked> صفحات تمهيدية</label>
          <label><input id="showPageNumbers" type="checkbox" checked> أرقام الصفحات</label>
          <label><input id="highlightDialogues" type="checkbox" checked> إبراز الحوارات</label>
          <label><input id="highlightQuotes" type="checkbox" checked> إبراز الاقتباسات</label>
        </div>

        <div class="row">
          <button id="applyThemeBtn">تطبيق الثيم</button>
          <button id="generatePreviewBtn" class="primary">تحديث المعاينة</button>
        </div>
      </section>

      <section class="panel">
        <h2>الحفظ والتصدير</h2>
        <div class="row wrap">
          <button id="saveProjectBtn">حفظ المشروع</button>
          <button id="loadProjectBtn">استرجاع المشروع</button>
          <button id="exportProjectBtn">تصدير المشروع JSON</button>
          <input id="projectFileInput" type="file" accept=".json" hidden>
        </div>
        <div class="row wrap">
          <button id="downloadPdfBtn" class="primary">تنزيل PDF</button>
          <button id="downloadHtmlBtn">تنزيل HTML</button>
          <button id="downloadTxtBtn">تنزيل TXT</button>
          <button id="downloadZipImagesBtn">تنزيل الصفحات ZIP</button>
        </div>
        <p class="small-note">الـ PDF يُبنى من صور صفحات المعاينة نفسها حتى ينزل بنفس الشكل ويمنع مشكلة الصفحات البيضاء.</p>
      </section>
    </aside>

    <main class="main-area">
      <div class="topbar glass">
        <div>
          <h2>معاينة الكتاب</h2>
          <p id="statusText">جاهز</p>
        </div>
        <div class="topbar-actions">
          <button id="previewSpreadBtn">عرض مزدوج</button>
          <button id="previewSingleBtn" class="active">عرض منفرد</button>
        </div>
      </div>

      <div id="previewWrapper" class="preview-wrapper single"></div>
    </main>
  </div>

  <div id="measureRoot" class="measure-root" aria-hidden="true"></div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card glass">
      <div class="spinner"></div>
      <h3 id="loadingTitle">جارٍ التنفيذ...</h3>
      <p id="loadingDesc">يرجى الانتظار</p>
    </div>
  </div>

  <template id="pageTemplate">
    <article class="page-card">
      <div class="page-sheet">
        <div class="page-inner"></div>
        <div class="page-number"></div>
      </div>
      <button class="download-page-btn">تنزيل هذه الصفحة</button>
    </article>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
